name: Keep Streamlit App Alive

on:
  schedule:
    # Runs every 4 hours (At minute 0 past every 4th hour)
    - cron: '0 */4 * * *'
  # Allows you to manually trigger the action anytime from GitHub
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit URL
        run: |
          curl -I https://astrotyre.streamlit.app
